<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="styles/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-cloud-sun"></i> Weather App</h1>
        </header>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Digite o nome da cidade...">
            <button id="searchBtn">
                <i class="fas fa-search"></i>
            </button>
        </div>

        <div class="weather-info" id="weatherInfo">
            <div class="loading" id="loading">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Carregando...</p>
            </div>

            <div class="error" id="error" style="display: none;">
                <i class="fas fa-exclamation-triangle"></i>
                <p>Cidade não encontrada!</p>
            </div>

            <div class="current-weather" id="currentWeather" style="display: none;">
                <div class="location">
                    <h2 id="cityName">-</h2>
                    <span id="dateTime">-</span>
                </div>
                
                <div class="temp">
                    <span id="currentTemp">-</span>
                    <span class="unit">°C</span>
                </div>
                
                <div class="weather-icon">
                    <i id="weatherIcon" class="fas"></i>
                    <p id="weatherDesc">-</p>
                </div>

                <div class="details-grid">
                    <div class="detail-item">
                        <i class="fas fa-thermometer-half"></i>
                        <div>
                            <span>Máx</span>
                            <span id="tempMax">-</span>
                        </div>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-thermometer-empty"></i>
                        <div>
                            <span>Mín</span>
                            <span id="tempMin">-</span>
                        </div>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-wind"></i>
                        <div>
                            <span>Vento</span>
                            <span id="windSpeed">-</span>
                        </div>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-tint"></i>
                        <div>
                            <span>Umidade</span>
                            <span id="humidity">-</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script/script.js"></script>
</body>
</html>
